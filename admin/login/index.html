<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Daily Activities : Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Admin Login</h1>
                <p class="text-slate-500 text-sm">Verify credentials to access the logger</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Admin ID</label>
                    <input type="text" id="adminId" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="e.g. admin1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center">
                    <span id="loginBtnText">Access Dashboard</span>
                    <div id="loginBtnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"></div>
                </button>
            </form>
            <div id="loginStatus" class="mt-4 hidden p-3 rounded-lg text-sm text-center"></div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzgsuA7_mjRWvpcuagCPKYlE91vxq0V2M4XGXT9udM3yLZ2mvr8TBL0eFYv7VvoVnpK/exec';

        const getBasePath = () => {
            const path = window.location.pathname;
            // If on GitHub Pages, the first part of the path is the repo name
            if (window.location.hostname.includes("github.io")) {
                return "/" + path.split('/')[1] + "/";
            }
            return "/"; // Localhost root
        };
        console.log("Base path:", getBasePath());
        function getCookie(name) {
            // 1. Get all cookies and split them by the semicolon
            let cookieArr = document.cookie.split(";");

            // 2. Loop through each cookie pair
            for (let i = 0; i < cookieArr.length; i++) {
                let cookiePair = cookieArr[i].split("=");

                // 3. Remove whitespace and check if the name matches
                if (name === cookiePair[0].trim()) {
                    // 4. Return the value (the token)
                    return decodeURIComponent(cookiePair[1]);
                }
            }
            // Return null if the cookie was not found
            return null;
        }

        // How to use it:
        const token = getCookie("userToken");

        if (token) {
            window.location.href = getBasePath() + "/admin/";
        }

        // Elements
        const loginScreen = document.getElementById('loginScreen');
        const loginForm = document.getElementById('loginForm');

        // Login Logic
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loginBtnLoader');
            const status = document.getElementById('loginStatus');

            btn.disabled = true;

            let payload = {
                action: 'login',
                adminId: document.getElementById('adminId').value,
                password: document.getElementById('password').value,
                status: '0001'
            };

            try {

                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error("Server returned status " + response.status);
                }

                const result = await response.json();

                if (result.status === 'success') {
                    const newToken = generateToken(20);
                    // Sets a cookie that expires in 7 days
                    const d = new Date();
                    d.setTime(d.getTime() + (7*24*60*60*1000));
                    let expires = "expires="+ d.toUTCString();

                    document.cookie = "userToken=" + newToken + ";" + expires + ";path=/;SameSite=Strict";

                    payload.token = newToken;
                    payload.status = '0002'; // Update status for token storage
                    payload.name = result.name;

                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // window.location.reload();
                    window.location.href = getBasePath() + "/admin/";
                } else {
                    status.textContent = 'Invalid credentials. Please check and try again.';
                    status.className = 'mt-4 p-3 rounded-lg text-sm text-center block bg-red-100 text-red-700';
                    status.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                status.textContent = 'Connection error. Make sure Apps Script is deployed as "Anyone".';
                status.className = 'mt-4 p-3 rounded-lg text-sm text-center block bg-red-100 text-red-700';
                status.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        });

        function generateToken(length = 20) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

    </script>
</body>
</html>
